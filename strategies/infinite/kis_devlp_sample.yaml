# 한국투자증권 Open API 설정 샘플
# 이 파일을 복사하여 실제 값으로 수정한 뒤, 아래 경로에 kis_devlp.yaml로 저장하세요.
# Windows: C:\Users\USER\KIS\config\kis_devlp.yaml
# Linux/Mac: ~/KIS/config/kis_devlp.yaml

# 실전투자
my_app: "실전투자 앱키"
my_sec: "실전투자 앱시크릿"

# 모의투자
paper_app: "모의투자 앱키"
paper_sec: "모의투자 앱시크릿"

# HTS ID (체결통보 등에 사용)
my_htsid: "HTS_ID"

# 계좌번호 - 실전
my_acct_stock: "12345678"   # 증권계좌 8자리
my_acct_future: "12345678"
my_prod: "01"               # 01: 종합계좌

# 계좌번호 - 모의
my_paper_stock: "12345678"
my_paper_future: "12345678"

# User-Agent (기본값)
my_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"

# API 도메인 (변경 불필요)
prod: "https://openapi.koreainvestment.com:9443"
vps: "https://openapivts.koreainvestment.com:29443"
ops: "ws://ops.koreainvestment.com:21000"
vops: "ws://ops.koreainvestment.com:31000"
